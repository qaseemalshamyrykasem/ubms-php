name: Build Android APK

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  PHP_VERSION: "8.3"
  NODE_VERSION: "22"
  JAVA_VERSION: "17"
  ANDROID_SDK_ROOT: "/usr/local/lib/android/sdk"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_API: "34"
  ANDROID_NDK_VERSION: "26.1.10909125"

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

    # =======================
    # 1. Checkout
    # =======================
    - name: Checkout Code
      uses: actions/checkout@v4

    # =======================
    # 2. PHP
    # =======================
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, intl, curl, zip, gd, sqlite3, pdo, xml, bcmath

    # =======================
    # 3. Node
    # =======================
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}

    # =======================
    # 4. Java
    # =======================
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: ${{ env.JAVA_VERSION }}

    # =======================
    # 5. ANDROID SDK (FIXED - NO HANG)
    # =======================
    - name: Install Android SDK (Manual Safe Setup)
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip

        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

        cd /tmp
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip

        unzip -q commandlinetools-linux-*.zip
        mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

        export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

        yes | sdkmanager --licenses || true

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0" \
          "ndk;26.1.10909125"

    # =======================
    # 6. Composer Install
    # =======================
    - name: Install Composer Dependencies
      working-directory: ./backend
      run: |
        composer validate
        composer install --no-interaction --prefer-dist --optimize-autoloader

    # =======================
    # 7. Laravel Setup
    # =======================
    - name: Laravel Setup
      working-directory: ./backend
      run: |
        cp .env.example .env || true
        php artisan key:generate || true

    # =======================
    # 8. Build APK (NativePHP / Gradle fallback)
    # =======================
    - name: Build APK
      working-directory: ./backend
      run: |
        if php artisan list | grep -q "native:build"; then
          php artisan native:build android || true
        fi

        if [ -d "nativephp/android" ]; then
          cd nativephp/android
          chmod +x gradlew
          ./gradlew assembleDebug
        fi

    # =======================
    # 9. Find APK
    # =======================
    - name: Find APK
      working-directory: ./backend
      run: |
        find . -name "*.apk" | head -20

    # =======================
    # 10. Upload APK
    # =======================
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: backend/**/*.apk
